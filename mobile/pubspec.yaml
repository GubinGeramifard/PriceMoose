name: grocery_compare
description: Canadian grocery price comparison app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # Networking
  dio: ^5.4.3+1

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Barcode scanning
  mobile_scanner: ^5.1.1

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local storage (shopping lists)
  hive_flutter: ^1.1.0

  # UI utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  intl: ^0.19.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  # fonts: (Poppins - add .ttf files to assets/fonts/ to enable)
